<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; height: 500px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 8px; max-width: 75%; font-size: 0.95em; line-height: 1.4; white-space: pre-wrap; }
        .user { background: #007bff; color: white; align-self: flex-end; }
        .bot { background: #e9ecef; color: #333; align-self: flex-start; }
        .input-area { display: flex; border-top: 1px solid #ddd; padding: 10px; background: #fff; }
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .input-area button { background: #007bff; color: white; border: none; padding: 10px 15px; margin-left: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .input-area button:hover { background: #0056b3; }
        .typing { font-style: italic; color: #888; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">My AI Chatbot</div>
    <div class="chat-box" id="chatBox">
        <div class="message bot">Hello! I am your AI assistant. Ask me anything you want!</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message here..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run"
    }
  }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // Put your actual Gemini API Key here
    const API_KEY = "AQ.Ab8RN6INTJ2-_n46Aurdx4qcHe3u6xiW8H-U8kIZKCzvmh00qQ"; 
    
    const genAI = new GoogleGenerativeAI(API_KEY);
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    window.sendMessage = async function() {
        const text = userInput.value.trim();
        if (text === '') return;

        appendMessage(text, 'user');
        userInput.value = '';

        const typingDiv = appendMessage('AI is thinking...', 'bot typing');

        try {
            const result = await model.generateContent(text);
            const response = await result.response;
            let botText = response.text();

            typingDiv.innerText = botText;
            typingDiv.classList.remove('typing');
        } catch (error) {
            console.error(error);
            typingDiv.innerText = "Error: Please check your API Key.";
            typingDiv.classList.remove('typing');
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    window.handleKeyPress = function(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function appendMessage(text, senderClasses) {
        const messageDiv = document.createElement('div');
        senderClasses.split(' ').forEach(cls => messageDiv.classList.add(cls));
        messageDiv.innerText = text;
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return messageDiv;
    }
</script>

</body>
</html>
