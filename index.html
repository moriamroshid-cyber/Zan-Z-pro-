<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; height: 500px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 8px; max-width: 75%; font-size: 0.95em; line-height: 1.4; }
        .user { background: #007bff; color: white; align-self: flex-end; }
        .bot { background: #e9ecef; color: #333; align-self: flex-start; }
        .input-area { display: flex; border-top: 1px solid #ddd; padding: 10px; background: #fff; }
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .input-area button { background: #007bff; color: white; border: none; padding: 10px 15px; margin-left: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .input-area button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Browser Chatbot</div>
    <div class="chat-box" id="chatBox">
        <div class="message bot">Hello buddy! I am your browser chatbot. How can I help you?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message here..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    function sendMessage() {
        const text = userInput.value.trim();
        if (text === '') return;

        appendMessage(text, 'user');
        userInput.value = '';

        setTimeout(() => {
            let botResponse = getBotResponse(text);
            appendMessage(botResponse, 'bot');
        }, 800);
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function appendMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender);
        messageDiv.innerText = text;
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function getBotResponse(input) {
        const msg = input.toLowerCase();
        
        if (msg.includes('hello') || msg.includes('hi')) {
            return "Hey there! Great to see you here.";
        } else if (msg.includes('how are you')) {
            return "I am doing great running right inside your browser! Thanks for asking.";
        } else if (msg.includes('name')) {
            return "I am a custom Browser Bot created by you!";
        } else if (msg.includes('help')) {
            return "Sure! Tell me what you need help with.";
        } else {
            return "That sounds interesting! Tell me more about it.";
        }
    }
</script>

</body>
</html>
